# Pre-commit hooks para geo-finops. Sincroniza com security-scan.yml.
#
# Instalar (uma vez): pip install pre-commit && pre-commit install
# Rodar manual:       pre-commit run --all-files
#
# O secret_guard em .tools/ foi absorvido pelo gitleaks oficial abaixo.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        args: ["--package", "geo_finops"]
        additional_dependencies: ["httpx", "alembic", "pyyaml"]
        pass_filenames: false

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-r", "geo_finops"]
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: pytest
        name: pytest (unit tests)
        entry: python -m pytest tests/ -q
        language: system
        pass_filenames: false
        stages: [pre-push]
