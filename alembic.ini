# alembic.ini — geo-finops migration configuration
#
# Achado B-014 da auditoria de ecossistema 2026-04-08. Setup minimal
# de Alembic para migracoes de schema do calls.db. Antes deste setup,
# adicionar uma coluna no schema exigia migration manual fragil.
#
# Uso:
#   alembic -c alembic.ini current     # versao atual
#   alembic -c alembic.ini history     # historico de migrations
#   alembic -c alembic.ini upgrade head  # aplica todas pendentes
#   alembic -c alembic.ini revision -m "descricao"  # cria nova
#
# A URL do banco eh resolvida em runtime pelo env.py via
# geo_finops.db.get_db_path() — respeitando GEO_FINOPS_DB_PATH.

[alembic]
script_location = geo_finops/migrations
prepend_sys_path = .
version_path_separator = os
path_separator = os
output_encoding = utf-8

# sqlalchemy.url eh setado dinamicamente em env.py — nao definir aqui
# para evitar conflito com GEO_FINOPS_DB_PATH

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
